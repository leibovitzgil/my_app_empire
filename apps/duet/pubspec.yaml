name: duet
description: "Collaborative sheet music & mentorship."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  analytics:
    path: ../../packages/services/analytics
  archive: ^4.0.7
  audio:
    path: ../../packages/services/audio
  bloc: ^9.2.1
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.0
  core_ui:
    path: ../../packages/core/core_ui
  core_utils:
    path: ../../packages/core/core_utils
  crash_reporting:
    path: ../../packages/services/crash_reporting
  deep_linking:
    path: ../../packages/services/deep_linking
  equatable: ^2.0.5
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_paywall:
    path: ../../packages/features/feature_paywall
  feature_settings:
    path: ../../packages/features/feature_settings
  file_picker: ^12.0.0-beta.7
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_storage: ^13.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  legal_compliance:
    path: ../../packages/core/legal_compliance
  local_storage:
    path: ../../packages/core/local_storage
  monetization:
    path: ../../packages/core/monetization
  notifications:
    path: ../../packages/services/notifications
  path: ^1.9.0
  path_provider: ^2.1.6
  pdf_rendering:
    path: ../../packages/services/pdf_rendering
  remote_config:
    path: ../../packages/services/remote_config
  share_plus: ^13.2.0
  user_directory:
    path: ../../packages/core/user_directory

dev_dependencies:
  bloc_test: ^10.0.0
  fake_async: ^1.3.1
  fake_cloud_firestore: ^4.2.0
  firebase_messaging: ^16.4.1
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0
  shared_preferences: ^2.2.2
  very_good_analysis: ^10.3.0

# The Material icon font (MaterialIcons-Regular.otf) is only bundled when
# this is declared. Without it every `Icons.*` codepoint falls back to the
# system font and renders as a question mark box.
flutter:
  uses-material-design: true
