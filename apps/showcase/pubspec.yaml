publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  core_ui:
    path: ../../packages/core/core_ui
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_onboarding:
    path: ../../packages/features/feature_onboarding
  feature_paywall:
    path: ../../packages/features/feature_paywall
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
