name: showcase
description: A reference app composing auth, onboarding, paywall and monetization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  core_ui:
    path: ../../packages/core/core_ui
  core_utils:
    path: ../../packages/core/core_utils
  deep_linking:
    path: ../../packages/services/deep_linking
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_onboarding:
    path: ../../packages/features/feature_onboarding
  feature_paywall:
    path: ../../packages/features/feature_paywall
  feature_settings:
    path: ../../packages/features/feature_settings
  feedback_form:
    path: ../../packages/core/feedback_form
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  local_storage:
    path: ../../packages/core/local_storage
  monetization:
    path: ../../packages/core/monetization
  notifications:
    path: ../../packages/services/notifications
  user_roles:
    path: ../../packages/core/user_roles

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  shared_preferences: ^2.2.2
  very_good_analysis: ^10.3.0
