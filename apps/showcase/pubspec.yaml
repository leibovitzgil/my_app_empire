  local_storage:
    path: ../../packages/core/local_storage
  monetization:
    path: ../../packages/core/monetization

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  shared_preferences: ^2.2.0
  very_good_analysis: ^5.1.0
