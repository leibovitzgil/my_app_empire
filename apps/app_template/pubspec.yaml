name: app_template
description: A template app using the monorepo packages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  core_ui:
    path: ../../packages/core/core_ui
  feature_auth:
    path: ../../packages/features/feature_auth
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.8
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.1.0
  very_good_analysis: ^10.3.0
