name: tandem
description: "Tandem: the grocery list you shop together, in real time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  cloud_firestore: ^6.0.0
  core_ui:
    path: ../../packages/core/core_ui
  core_utils:
    path: ../../packages/core/core_utils
  deep_linking:
    path: ../../packages/services/deep_linking
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_grocery_list:
    path: ../../packages/features/feature_grocery_list
  feature_onboarding:
    path: ../../packages/features/feature_onboarding
  firebase_core: ^4.11.0
  firebase_database: ^12.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  local_storage:
    path: ../../packages/core/local_storage
  user_roles:
    path: ../../packages/core/user_roles

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  shared_preferences: ^2.2.2
  very_good_analysis: ^10.3.0

# The Material icon font (MaterialIcons-Regular.otf) is only bundled when
# this is declared. Without it every `Icons.*` codepoint falls back to the
# system font and renders as a question mark box.
flutter:
  uses-material-design: true
