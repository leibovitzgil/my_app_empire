name: tandem
description: "Tandem: the grocery list you shop together, in real time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  core_ui:
    path: ../../packages/core/core_ui
  core_utils:
    path: ../../packages/core/core_utils
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_grocery_list:
    path: ../../packages/features/feature_grocery_list
  feature_onboarding:
    path: ../../packages/features/feature_onboarding
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  local_storage:
    path: ../../packages/core/local_storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  shared_preferences: ^2.2.2
  very_good_analysis: ^10.3.0
