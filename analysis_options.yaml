include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "**/*.mocks.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_required_param: error
    missing_return: error
    todo: ignore

linter:
  rules:
    # These are internal monorepo packages (publish_to: none), not published
    # libraries, so documenting every public member is noise rather than value.
    public_member_api_docs: false
    # Setters like `setBool(key, value)` read naturally with a positional bool
    # and mirror the underlying SharedPreferences/RevenueCat APIs.
    avoid_positional_boolean_parameters: false
