name: my_app_factory
repository: https://github.com/my_org/my_app_factory

packages:
  - apps/**
  - packages/**

scripts:
  lint:
    run: melos exec -- flutter analyze .
    description: Run `flutter analyze` in all packages.

  bootstrap:
    run: melos bootstrap
    description: Bootstrap all packages.

  clean:
    run: melos clean
    description: Clean all packages.

  install-hooks:
    run: git config core.hooksPath .githooks
    description: Install the repo git hooks (format + analyze on pre-commit).

  test:
    run: melos exec --dir-exists="test" -- flutter test --exclude-tags golden
    description: Run unit/widget tests (excludes golden tests; see `golden`).

  golden:
    run: melos exec --dir-exists="test/golden" -- flutter test --tags golden
    description: Run golden (screenshot) tests.

  update-goldens:
    run: melos exec --dir-exists="test/golden" -- flutter test --tags golden --update-goldens
    description: Regenerate golden screenshots. Run in the same env as CI.

  coverage:
    run: melos exec --dir-exists="test" -- flutter test --exclude-tags golden --coverage
    description: Run tests with coverage; writes coverage/lcov.info per package.

  e2e:
    run: melos exec --dir-exists="integration_test" -- flutter test integration_test
    description: Run integration_test end-to-end flows headlessly.

  e2e-emulator:
    run: >-
      npm --prefix apps/duet/functions ci --no-audit --no-fund &&
      npm --prefix apps/duet/functions run build &&
      cd apps/duet &&
      npx --yes firebase-tools emulators:exec
      --only auth,firestore,functions,storage
      --project demo-duet 'flutter test integration_test -d chrome'
    description: |
      Reader/cloud E2E against the REAL Firebase emulator suite (M4.5): boots
      Auth + Firestore + Functions + Storage around the integration_test flows
      (auth_lifecycle M1.10, cloud_pieces_flow M3.8, collaborator_flow, plus
      the reader assertions of M4.1-M4.4), proving `useFirebase: true` is
      server-authoritative end-to-end — not against the in-memory fakes the
      standard gate uses. Unlike `e2e`, this boots the emulators itself, so it
      is the single turnkey command.

      Needs Java (emulator runtime) and Node (the functions are rebuilt first
      so the Functions emulator serves the current callables/triggers). Runs
      today on a device/desktop target where `dart:io` + the native Firebase
      plugins coexist (`./dev.sh --emulators-only` in one shell, then this in
      another). NOTE: two suites (cloud_pieces_flow, auth_lifecycle) use
      `dart:io`, so `-d chrome` (web) can't run them headlessly — the CI
      `emulator-e2e` job is non-blocking until they move to `flutter drive` on
      a native device or are refactored off `dart:io`.

  functions-test:
    run: >-
      npm --prefix apps/duet/functions ci --no-audit --no-fund &&
      npm --prefix apps/duet/functions run lint &&
      npm --prefix apps/duet/functions run build &&
      npm --prefix apps/duet/functions test
    description: |
      Install, lint, build, and test the Duet Cloud Functions workspace
      (apps/duet/functions — npm/TypeScript, outside the melos packages).
      Tests boot the Auth + Firestore emulators around vitest, so Java is
      required. The single entry point CI uses (see task M0.5).

  rules-test:
    run: >-
      npm --prefix apps/duet/firestore_tests ci --no-audit --no-fund &&
      npm --prefix apps/duet/firestore_tests test
    description: |
      Install and run the Duet Firestore security-rules tests
      (apps/duet/firestore_tests — npm/TypeScript, outside the melos
      packages). Boots a Firestore emulator around vitest, so it needs
      Java on PATH. CI runs the same suite via the `rules-tests` job in
      ci.yaml (task M1.7).

  format:
    run: melos exec -- dart format .
    description: Format all packages.

  format-check:
    run: melos exec -- dart format --output=none --set-exit-if-changed .
    description: Fail if any package is not formatted (used by CI).

  create_app:
    run: dart run tool/create_app.dart
    description: |
      Scaffold a new app from app_template.
      Usage: melos run create_app -- <app_name> [--description "..."]

  create_feature:
    run: dart run tool/create_feature.dart
    description: |
      Scaffold a new feature package (domain/data/bloc/ui + test).
      Usage: melos run create_feature -- <name> [--description "..."] [--wire <app>]

  create_package:
    run: dart run tool/create_package.dart
    description: |
      Scaffold a new core/service package (service + barrel + test).
      Usage: melos run create_package -- <name> [--layer core|services] [--wire <app>]
