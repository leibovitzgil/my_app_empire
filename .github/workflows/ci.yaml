name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Bootstrap, format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Verify formatting
        run: melos run format-check

      - name: Analyze
        run: melos run lint

      - name: Test
        run: melos run test

      - name: Coverage
        run: melos run coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: packages/**/coverage/lcov.info
          if-no-files-found: ignore

  goldens:
    name: Golden screenshots
    runs-on: ubuntu-latest
    # Non-blocking: golden rendering can drift across environments. Failures
    # are uploaded as artifacts (actual + diff) for review rather than blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Golden tests
        run: melos run golden

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-failures
          path: "**/test/golden/failures/*.png"
          if-no-files-found: ignore
