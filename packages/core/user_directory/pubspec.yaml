name: user_directory
description: "Email-based user discovery directory for collaborator invites."
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  cloud_firestore: ^6.0.0
  core_utils:
    path: ../core_utils
  equatable: ^2.0.5
  flutter:
    sdk: flutter

dev_dependencies:
  fake_cloud_firestore: ^4.2.0
  flutter_test:
    sdk: flutter
  # Bundled with fake_cloud_firestore; its `whenCalling(...).on(doc)` API
  # lets a test make a specific GET throw (e.g. the emulator's
  # permission-denied), which the fake itself never raises (it evaluates no
  # rules).
  mock_exceptions: ^0.8.0
  very_good_analysis: ^10.3.0
