name: monetization
description: Core monetization package using RevenueCat.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  purchases_flutter: ^10.3.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

# This package ships widgets that use `Icons.*`, so it declares the Material
# icon font itself: any app composing it then bundles the font, rather than
# every app having to remember the flag to avoid question-mark boxes.
flutter:
  uses-material-design: true
