name: feature_settings
description: App settings - push notification toggle.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  bloc: ^9.2.1
  core_ui:
    path: ../../core/core_ui
  core_utils:
    path: ../../core/core_utils
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  local_storage:
    path: ../../core/local_storage

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  very_good_analysis: ^10.3.0

# This package ships widgets that use `Icons.*`, so it declares the Material
# icon font itself: any app composing it then bundles the font, rather than
# every app having to remember the flag to avoid question-mark boxes.
flutter:
  uses-material-design: true
