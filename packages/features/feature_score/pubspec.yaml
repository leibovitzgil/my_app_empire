version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  audio:
    path: ../../services/audio
  bloc: ^9.2.1
  core_ui:
