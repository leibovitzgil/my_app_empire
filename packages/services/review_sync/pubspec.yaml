name: review_sync
description: "Exports, shares and imports review bundles for pieces."
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  archive: ^4.0.7
  core_utils:
    path: ../../core/core_utils
  file_picker: ^12.0.0-beta.7
  flutter:
    sdk: flutter
  local_storage:
    path: ../../core/local_storage
  path: ^1.9.0
  path_provider: ^2.1.6
  pieces:
    path: ../../core/pieces
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  shared_preferences: ^2.2.2
  very_good_analysis: ^10.3.0
