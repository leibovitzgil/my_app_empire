publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  cloud_firestore: ^6.0.0
  core_utils:
    path: ../../core/core_utils
  equatable: ^2.0.5
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.4.2
  shared_preferences: ^2.2.2

dev_dependencies:
  build_runner: ^2.4.8
  fake_cloud_firestore: ^4.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  very_good_analysis: ^10.3.0
